services:
  # Backend Web Service
  - type: web
    name: sms-backend
    env: python
    buildCommand: cd backend && ./build.sh
    startCommand: cd backend && gunicorn sms.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "school-management-systems-tinditech.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://school-management-systems-4n8d.onrender.com,https://school-management-systems-tinditech.onrender.com,http://localhost:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://school-management-systems-4n8d.onrender.com,https://school-management-systems-tinditech.onrender.com,http://localhost:5173"

  # Frontend Static Site
  - type: web
    name: sms-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://school-management-systems-tinditech.onrender.com/api" # Use explicit production URL with /api suffix
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: sms-db
    plan: free # Change to starter for production
